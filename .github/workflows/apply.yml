name: Terragrunt Apply

on:
  push:
    branches: [main]
    paths:
      - '**/*.hcl'
      - '**/*.tf'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to apply (DEV01, STG01, PRD01)'
        required: true
        type: choice
        options:
          - DEV01
          - STG01
          - PRD01

permissions:
  contents: read
  id-token: write

env:
  TF_VERSION: "1.9.8"
  TG_VERSION: "0.54.0"
  ARM_USE_OIDC: true

jobs:
  apply:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'DEV01' }}
    env:
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Setup Terragrunt
        run: |
          curl -L "https://github.com/gruntwork-io/terragrunt/releases/download/v${{ env.TG_VERSION }}/terragrunt_linux_amd64" -o terragrunt
          chmod +x terragrunt
          sudo mv terragrunt /usr/local/bin/

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terragrunt Apply
        working-directory: ${{ github.event.inputs.environment || 'DEV01' }}
        run: terragrunt run-all apply --terragrunt-non-interactive -auto-approve
