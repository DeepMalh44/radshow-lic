name: Terragrunt Plan

on:
  pull_request:
    branches: [main]
    paths:
      - '**/*.hcl'
      - '**/*.tf'

permissions:
  contents: read
  pull-requests: write
  id-token: write  # OIDC for Azure

env:
  TF_VERSION: "1.9.8"
  TG_VERSION: "0.54.0"

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      environments: ${{ steps.detect.outputs.environments }}
    steps:
      - uses: actions/checkout@v4
      - id: detect
        name: Detect changed environments
        run: |
          ENVS=$(git diff --name-only origin/main...HEAD | grep -oP '^(DEV01|STG01|PRD01)' | sort -u | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "environments=$ENVS" >> "$GITHUB_OUTPUT"

  plan:
    needs: detect-changes
    if: needs.detect-changes.outputs.environments != '[]'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        environment: ${{ fromJson(needs.detect-changes.outputs.environments) }}
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Setup Terragrunt
        run: |
          curl -L "https://github.com/gruntwork-io/terragrunt/releases/download/v${{ env.TG_VERSION }}/terragrunt_linux_amd64" -o terragrunt
          chmod +x terragrunt
          sudo mv terragrunt /usr/local/bin/

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terragrunt Plan
        working-directory: ${{ matrix.environment }}
        run: terragrunt run-all plan --terragrunt-non-interactive -out=tfplan 2>&1 | tee plan-output.txt

      - name: Comment PR with Plan
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const output = fs.readFileSync('${{ matrix.environment }}/plan-output.txt', 'utf8');
            const body = `### Terragrunt Plan: \`${{ matrix.environment }}\`\n\`\`\`\n${output.slice(-3000)}\n\`\`\``;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
